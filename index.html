<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bullet Journal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f0;
  --surface: #fffefb;
  --border: #e2ddd5;
  --border2: #d0cac0;
  --text: #1c1917;
  --muted: #78716c;
  --light: #c4bdb5;
  --accent: #2d5016;
  --accent-soft: #e8f0e0;
  --red: #991b1b;
  --red-soft: #fef2f2;
  --yellow: #92400e;
  --yellow-soft: #fffbeb;
  --r: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body {
  font-family: 'DM Mono', 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 460px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ── HEADER ── */
.hdr {
  padding: 20px 18px 14px;
  border-bottom: 2px solid var(--text);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 50;
}
.hdr-top { display: flex; align-items: center; justify-content: space-between; }
.hdr h1 {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -.3px;
  line-height: 1;
}
.today-badge {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  letter-spacing: .3px;
}

/* ── TOOLBAR ── */
.toolbar {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 6px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.search {
  font-family: inherit;
  font-size: 12px;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search:focus { border-color: var(--text); }
.tbtn {
  font-family: inherit;
  font-size: 11px;
  padding: 9px 13px;
  border: 1.5px solid var(--border);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  white-space: nowrap;
  transition: all .12s;
  font-weight: 500;
}
.tbtn:hover { background: var(--bg); }
.tbtn:active { opacity: .7; }
.tbtn.new-btn {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
  font-size: 13px;
  padding: 9px 16px;
  letter-spacing: .3px;
}
.tbtn.danger { border-color: var(--red); color: var(--red); }
.tbtn.danger:hover { background: var(--red-soft); }

/* ── SECTION DIVIDER ── */
.section-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px 6px;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.section-bar.past { color: var(--light); }
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-bar.past .section-line { background: var(--border); opacity: .5; }

/* ── DAY GROUP ── */
.day-group { border-bottom: 1px solid var(--border); }
.day-group.is-today { border-left: 3px solid var(--accent); }
.day-group.is-past { opacity: .72; }

.day-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 18px 9px;
  cursor: pointer;
  user-select: none;
  background: transparent;
  transition: background .1s;
}
.day-group.is-today .day-hdr { padding-left: 15px; }
.day-hdr:active { background: var(--bg); }
.day-caret { font-size: 8px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
.day-group.closed .day-caret { transform: rotate(-90deg); }
.day-label { flex: 1; font-size: 12px; font-weight: 500; }
.today-tag {
  font-size: 9px;
  background: var(--accent);
  color: #fff;
  border-radius: 20px;
  padding: 2px 7px;
  letter-spacing: .3px;
  font-weight: 500;
}
.day-count {
  font-size: 10px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 10px;
  border: 1px solid var(--border);
}
.day-plus {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--muted);
  cursor: pointer;
  border-radius: 6px;
  transition: all .12s;
}
.day-plus:active { background: var(--bg); color: var(--text); }

.day-body { overflow: hidden; }
.day-group.closed .day-body { display: none; }

/* ── TASK ROW ── */
.task-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 18px;
  transition: background .1s;
  border-radius: 0;
}
.day-group.is-today .task-row { padding-left: 15px; }
.task-row:active { background: var(--bg); }

.chk-box {
  width: 17px;
  height: 17px;
  border: 2px solid var(--border2);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all .15s;
}
.chk-box:hover { border-color: var(--text); }
.chk-box.done {
  background: var(--text);
  border-color: var(--text);
}
.chk-box.done::after {
  content: '';
  width: 6px;
  height: 4px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.bullet {
  width: 17px;
  height: 17px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--muted);
}

.pdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.p-green { background: #4a7c59; }
.p-yellow { background: #b45309; }
.p-red { background: var(--red); }

.task-main { flex: 1; min-width: 0; }
.task-name { font-size: 13px; word-break: break-word; line-height: 1.4; }
.task-name.done { text-decoration: line-through; color: var(--light); }
.repeat-tag {
  display: inline-block;
  font-size: 9px;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 1px 6px;
  border-radius: 10px;
  margin-top: 3px;
  font-weight: 500;
}

.task-time { font-size: 10px; color: var(--muted); flex-shrink: 0; margin-top: 3px; }

.task-acts {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-top: 1px;
}
.act-btn {
  font-family: inherit;
  font-size: 11px;
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
}
.act-btn:hover { border-color: var(--text); color: var(--text); }
.act-btn.red { border-color: #fca5a5; color: var(--red); }
.act-btn.red:hover { background: var(--red-soft); border-color: var(--red); }

.add-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 18px 10px;
  font-size: 11px;
  color: var(--light);
  cursor: pointer;
  transition: color .12s;
}
.day-group.is-today .add-row { padding-left: 15px; }
.add-row:hover { color: var(--muted); }

.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--muted);
  font-size: 12px;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,25,23,.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .22s ease;
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to { transform: none; opacity: 1; }
}
.modal-grip {
  width: 36px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  font-weight: 400;
}
.modal-x {
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  color: var(--muted);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}
.modal-x:active { background: var(--border); }
.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 20px; }

/* NAME */
.name-input {
  width: 100%;
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  padding: 0 0 12px;
  border: none;
  border-bottom: 2px solid var(--border);
  background: transparent;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.name-input:focus { border-color: var(--text); }
.name-input::placeholder { color: var(--light); }

/* SECTION */
.sec { display: flex; flex-direction: column; gap: 8px; }
.sec-lbl {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .8px;
  font-weight: 500;
}

/* DATE + TIME - simple inputs */
.datetime-row { display: flex; gap: 8px; align-items: center; }
.field-input {
  font-family: inherit;
  font-size: 13px;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.field-input:focus { border-color: var(--text); }
.field-input.date-input { flex: 1; }
.field-input.time-input { width: 130px; }

/* PRIORITY */
.pri-row { display: flex; gap: 8px; }
.pri-opt {
  flex: 1;
  padding: 11px 6px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-weight: 500;
  transition: all .15s;
  background: var(--bg);
}
.pri-opt .pd { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pri-opt.ag { border-color: #4a7c59; background: var(--accent-soft); color: var(--accent); }
.pri-opt.ay { border-color: #b45309; background: var(--yellow-soft); color: var(--yellow); }
.pri-opt.ar { border-color: var(--red); background: var(--red-soft); color: var(--red); }

/* TYPE */
.type-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.type-opt {
  padding: 12px 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
  background: var(--bg);
  font-family: inherit;
  font-weight: 500;
  transition: all .15s;
  color: var(--text);
}
.type-opt .ti { font-size: 16px; display: block; margin-bottom: 5px; }
.type-opt.sel { border-color: var(--text); background: var(--text); color: #fff; }

/* REPEAT */
.repeat-wrap { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--bg); }
.repeat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
}
.repeat-lbl { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.repeat-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
.repeat-body.show { display: block; }
.rep-fields { display: flex; flex-direction: column; gap: 10px; }
.rep-field label {
  display: block;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 4px;
  font-weight: 500;
}
.interval-row { display: flex; gap: 8px; margin-top: 8px; }
.int-opt {
  flex: 1;
  padding: 9px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  background: var(--surface);
  font-weight: 500;
  transition: all .15s;
  color: var(--text);
}
.int-opt.sel { border-color: var(--text); background: var(--text); color: #fff; }

/* TOGGLE */
.tog {
  position: relative;
  width: 42px;
  height: 24px;
  background: var(--border2);
  border-radius: 12px;
  cursor: pointer;
  border: none;
  transition: background .2s;
  flex-shrink: 0;
}
.tog.on { background: var(--accent); }
.tog::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  background: #fff;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.tog.on::after { transform: translateX(18px); }

/* FOOTER */
.modal-foot {
  display: flex;
  gap: 8px;
  padding: 12px 18px 32px;
  border-top: 1px solid var(--border);
}
.mbtn {
  flex: 1;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: all .12s;
}
.mbtn:active { opacity: .7; }
.mbtn.save { background: var(--text); color: #fff; border-color: var(--text); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #1c1917;
  color: #fff;
  font-family: inherit;
  font-size: 11px;
  padding: 8px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: all .22s;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* CLEAR CONFIRM */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,25,23,.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--surface);
  border-radius: 16px;
  width: 100%;
  max-width: 340px;
  padding: 24px;
  text-align: center;
  animation: popIn .18s ease;
}
@keyframes popIn {
  from { transform: scale(.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.confirm-box h3 { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: 400; margin-bottom: 8px; }
.confirm-box p { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 8px; }
.cbtn {
  flex: 1;
  font-family: inherit;
  font-size: 13px;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent;
  font-weight: 500;
}
.cbtn.danger { background: var(--red); color: #fff; border-color: var(--red); }

#importInput { display: none; }

/* ── EXTRA ACTIONS BAR ── */
.extra-toolbar {
  display: flex;
  gap: 6px;
  padding: 8px 18px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.extra-toolbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <h1>Bullet Journal</h1>
      <span class="today-badge" id="todayBadge"></span>
    </div>
  </div>

  <div class="toolbar">
    <input class="search" id="searchBox" type="text" placeholder="Search…" oninput="render()">
    <button class="tbtn new-btn" onclick="openAdd()">+ New</button>
    <button class="tbtn" onclick="exportTasks()" title="Export">↓</button>
    <button class="tbtn" onclick="document.getElementById('importInput').click()" title="Import">↑</button>
    <input type="file" id="importInput" accept=".json" onchange="importTasks(event)">
  </div>
  <div class="extra-toolbar">
    <button class="tbtn" onclick="openAdd()">+ Task</button>
    <button class="tbtn" style="border-color:#b45309;color:#b45309" onclick="openAddType('event')">● Event</button>
    <button class="tbtn" style="border-color:#6b7280;color:#6b7280" onclick="openAddType('note')">— Note</button>
    <button class="tbtn danger" onclick="openClearConfirm()">Clear All</button>
  </div>

  <div id="list"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal" id="modal">
    <div class="modal-grip"></div>
    <div class="modal-hdr">
      <span class="modal-title" id="mTitle">New Task</span>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <input type="text" class="name-input" id="fName" placeholder="What needs to be done?" maxlength="120" autocomplete="off">

      <!-- DATE + TIME — simple inputs -->
      <div class="sec">
        <div class="sec-lbl">📅 Date & Time</div>
        <div class="datetime-row">
          <input type="date" class="field-input date-input" id="fDate">
          <input type="time" class="field-input time-input" id="fTime" placeholder="optional">
        </div>
      </div>

      <!-- PRIORITY -->
      <div class="sec">
        <div class="sec-lbl">Priority</div>
        <div class="pri-row">
          <div class="pri-opt ag" data-p="green" onclick="setPri('green')"><span class="pd" style="background:#4a7c59"></span>Normal</div>
          <div class="pri-opt" data-p="yellow" onclick="setPri('yellow')"><span class="pd" style="background:#b45309"></span>High</div>
          <div class="pri-opt" data-p="red" onclick="setPri('red')"><span class="pd" style="background:#991b1b"></span>Critical</div>
        </div>
      </div>

      <!-- TYPE -->
      <div class="sec">
        <div class="sec-lbl">Type</div>
        <div class="type-grid">
          <button class="type-opt sel" data-t="task" onclick="setType('task')"><span class="ti">□</span>Task</button>
          <button class="type-opt" data-t="event" onclick="setType('event')"><span class="ti">●</span>Event</button>
          <button class="type-opt" data-t="note" onclick="setType('note')"><span class="ti">—</span>Note</button>
          <button class="type-opt" data-t="star" onclick="setType('star')"><span class="ti">★</span>Priority</button>
        </div>
      </div>

      <!-- REPEAT -->
      <div class="sec">
        <div class="repeat-wrap">
          <div class="repeat-header" onclick="toggleRepeat()">
            <span class="repeat-lbl">↻ Repeat / Multi-day</span>
            <button class="tog" id="repeatTog" onclick="event.stopPropagation();toggleRepeat()"></button>
          </div>
          <div class="repeat-body" id="repeatBody">
            <div class="rep-fields">
              <div class="rep-field">
                <label>Repeat Until</label>
                <input type="date" class="field-input" id="fRepeatEnd" style="width:100%">
              </div>
              <div>
                <div class="sec-lbl">Frequency</div>
                <div class="interval-row">
                  <button class="int-opt sel" data-i="1" onclick="setIv('1')">Daily</button>
                  <button class="int-opt" data-i="7" onclick="setIv('7')">Weekly</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div class="modal-foot">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- CLEAR CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay" onclick="closeClearConfirm(event)">
  <div class="confirm-box">
    <h3>Clear Everything?</h3>
    <p>This will permanently delete all tasks and habits. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="cbtn" onclick="closeClearConfirm()">Cancel</button>
      <button class="cbtn danger" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var tasks = [], editId = null, pri = 'green', taskType = 'task';
var repeatOn = false, iv = '1';

/* ── STORAGE ── */
function load() {
  try { tasks = JSON.parse(localStorage.getItem('bj5') || '[]'); } catch(e) { tasks = []; }
}
function save() { localStorage.setItem('bj5', JSON.stringify(tasks)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function todayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function addDays(s, n) {
  var d = new Date(s+'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function fmtDate(s) {
  var d = new Date(s+'T00:00:00');
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}
function fmtMonth(s) {
  var d = new Date(s+'T00:00:00');
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[d.getMonth()]+' '+d.getFullYear();
}
function fmt12(t) {
  if (!t) return '';
  var p = t.split(':'), h = parseInt(p[0]), m = p[1];
  return (h % 12 || 12)+':'+m+' '+(h >= 12 ? 'PM' : 'AM');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

/* ── TODAY BADGE ── */
function updateTodayBadge() {
  var d = new Date();
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('todayBadge').textContent = days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate();
}

/* ── CLEAR ── */
function openClearConfirm() { document.getElementById('confirmOverlay').classList.add('open'); }
function closeClearConfirm(e) {
  if (!e || e.target === document.getElementById('confirmOverlay'))
    document.getElementById('confirmOverlay').classList.remove('open');
}
function clearAll() {
  tasks = [];
  save();
  document.getElementById('confirmOverlay').classList.remove('open');
  render();
  toast('All tasks cleared');
}

/* ── MODAL ── */
function openAdd(ds, type) {
  editId = null;
  document.getElementById('mTitle').textContent = 'New Task';
  document.getElementById('fName').value = '';
  document.getElementById('fDate').value = ds || todayStr();
  document.getElementById('fTime').value = '';
  document.getElementById('fRepeatEnd').value = '';
  repeatOn = false;
  document.getElementById('repeatTog').classList.remove('on');
  document.getElementById('repeatBody').classList.remove('show');
  setPri('green');
  setType(type || 'task');
  setIv('1');
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('fName').focus(); }, 200);
}
function openAddType(type) { openAdd(null, type); }

function openEdit(id) {
  var t = tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  editId = id;
  document.getElementById('mTitle').textContent = 'Edit Task';
  document.getElementById('fName').value = t.name;
  document.getElementById('fDate').value = t.date;
  document.getElementById('fTime').value = t.time || '';
  document.getElementById('fRepeatEnd').value = t.repeatEnd || '';
  repeatOn = !!t.repeat;
  document.getElementById('repeatTog').classList.toggle('on', repeatOn);
  document.getElementById('repeatBody').classList.toggle('show', repeatOn);
  setPri(t.priority || 'green');
  setType(t.type || 'task');
  setIv(t.interval || '1');
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function outsideClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function saveTask() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); toast('Enter a task name'); return; }
  var date = document.getElementById('fDate').value || todayStr();
  var time = document.getElementById('fTime').value || '';
  var repeatEnd = repeatOn ? document.getElementById('fRepeatEnd').value : '';

  if (editId) {
    var idx = tasks.findIndex(function(t){ return t.id === editId; });
    if (idx >= 0) tasks[idx] = Object.assign(tasks[idx], {
      name: name, date: date, time: time,
      type: taskType, priority: pri,
      repeat: repeatOn, repeatEnd: repeatEnd, interval: iv
    });
    toast('Task updated');
  } else {
    tasks.push({
      id: uid(), name: name, date: date, time: time,
      type: taskType, priority: pri, done: false,
      repeat: repeatOn, repeatEnd: repeatEnd, interval: iv,
      createdAt: Date.now()
    });
    toast('Task added');
  }
  save(); closeModal(); render();
}

/* ── PRIORITY / TYPE / REPEAT ── */
function setPri(p) {
  pri = p;
  document.querySelectorAll('.pri-opt').forEach(function(el) {
    el.className = 'pri-opt';
    var dp = el.getAttribute('data-p');
    if (dp === p) el.classList.add(p==='green'?'ag':p==='yellow'?'ay':'ar');
  });
}
function setType(t) {
  taskType = t;
  document.querySelectorAll('.type-opt').forEach(function(el) {
    el.classList.remove('sel');
    if (el.getAttribute('data-t') === t) el.classList.add('sel');
  });
}
function toggleRepeat() {
  repeatOn = !repeatOn;
  document.getElementById('repeatTog').classList.toggle('on', repeatOn);
  document.getElementById('repeatBody').classList.toggle('show', repeatOn);
}
function setIv(v) {
  iv = v;
  document.querySelectorAll('.int-opt').forEach(function(el) {
    el.classList.remove('sel');
    if (el.getAttribute('data-i') === v) el.classList.add('sel');
  });
}

/* ── RENDER ── */
function getEntries() {
  var entries = [];
  tasks.forEach(function(task) {
    if (task.repeat && task.repeatEnd) {
      var cur = task.date, step = parseInt(task.interval)||1, count = 0;
      while (cur <= task.repeatEnd && count < 365) {
        // For repeated tasks, carry individual done state per date
        var doneKey = 'done_' + task.id + '_' + cur;
        var isDone = task.doneDates ? !!task.doneDates[cur] : false;
        entries.push(Object.assign({}, task, { _date: cur, _isDone: isDone, _doneKey: doneKey }));
        cur = addDays(cur, step); count++;
      }
    } else {
      entries.push(Object.assign({}, task, { _date: task.date, _isDone: !!task.done }));
    }
  });
  return entries;
}

function render() {
  var q = (document.getElementById('searchBox').value || '').toLowerCase();
  var entries = getEntries();
  if (q) entries = entries.filter(function(e){ return e.name.toLowerCase().indexOf(q) >= 0; });
  entries.sort(function(a,b){
    if (a._date !== b._date) return a._date < b._date ? -1 : 1;
    return (a.time||'99:99') < (b.time||'99:99') ? -1 : 1;
  });

  var today = todayStr();
  var groups = {}, order = [];
  entries.forEach(function(e){
    if (!groups[e._date]) { groups[e._date] = []; order.push(e._date); }
    groups[e._date].push(e);
  });

  /* Split into future/today and past */
  var futureOrder = [], pastOrder = [];
  order.forEach(function(d){ if (d >= today) futureOrder.push(d); else pastOrder.push(d); });

  var html = '';

  if (order.length === 0) {
    html = '<div class="empty"><div class="empty-icon">📓</div>No tasks yet.<br>Tap <b>+ New</b> to get started.</div>';
  } else {
    /* TODAY + FUTURE first */
    if (futureOrder.length > 0) {
      var lm = '';
      futureOrder.forEach(function(date){
        var month = fmtMonth(date);
        if (month !== lm) { html += '<div class="section-bar"><span class="section-line"></span><span>'+esc(month)+'</span><span class="section-line"></span></div>'; lm = month; }
        html += renderDayGroup(date, groups[date], today, false);
      });
    }

    /* PAST history */
    if (pastOrder.length > 0) {
      html += '<div class="section-bar past"><span class="section-line"></span><span>Past History</span><span class="section-line"></span></div>';
      var lm2 = '';
      /* Show past in reverse (most recent first) */
      pastOrder.slice().reverse().forEach(function(date){
        var month = fmtMonth(date);
        if (month !== lm2) { lm2 = month; }
        html += renderDayGroup(date, groups[date], today, true);
      });
    }
  }

  document.getElementById('list').innerHTML = html;
}

function renderDayGroup(date, items, today, isPast) {
  var isToday = date === today;
  var cls = 'day-group';
  if (isToday) cls += ' is-today';
  if (isPast) cls += ' is-past';

  var done = items.filter(function(i){ return i._isDone; }).length;

  var html = '<div class="'+cls+'">';
  html += '<div class="day-hdr" onclick="toggleDay(\''+date+'\')">';
  html += '<span class="day-caret">▼</span>';
  html += '<span class="day-label">'+esc(fmtDate(date))+'</span>';
  if (isToday) html += '<span class="today-tag">Today</span>';
  html += '<span class="day-count">'+done+'/'+items.length+'</span>';
  if (!isPast) html += '<span class="day-plus" onclick="event.stopPropagation();openAdd(\''+date+'\')">+</span>';
  html += '</div>';
  html += '<div class="day-body">';

  items.forEach(function(task){
    html += '<div class="task-row">';

    /* Bullet / checkbox logic: tasks always get checkbox; events/notes/star get bullet */
    if (task.type === 'event') {
      html += '<div class="bullet">●</div>';
    } else if (task.type === 'note') {
      html += '<div class="bullet" style="color:var(--muted)">—</div>';
    } else if (task.type === 'star') {
      html += '<div class="bullet">★</div>';
    } else if (task.repeat) {
      /* Repeated tasks: individual checkbox per occurrence */
      html += '<div class="chk-box'+(task._isDone?' done':'')+'" onclick="toggleRepeatDone(\''+task.id+'\',\''+task._date+'\')"></div>';
    } else {
      html += '<div class="chk-box'+(task._isDone?' done':'')+'" onclick="toggleDone(\''+task.id+'\')"></div>';
    }

    html += '<div class="pdot p-'+(task.priority||'green')+'"></div>';
    html += '<div class="task-main"><div class="task-name'+(task._isDone?' done':'')+'">'+esc(task.name)+'</div>';
    if (task.repeat) html += '<span class="repeat-tag">↻ '+(parseInt(task.interval)===7?'weekly':'daily')+'</span>';
    html += '</div>';

    if (task.time) html += '<span class="task-time">'+fmt12(task.time)+'</span>';

    html += '<div class="task-acts">';
    if (task.type === 'task' || task.type === 'star') {
      if (task.repeat) {
        html += '<button class="act-btn" onclick="toggleRepeatDone(\''+task.id+'\',\''+task._date+'\')">✓</button>';
      } else {
        html += '<button class="act-btn" onclick="toggleDone(\''+task.id+'\')">✓</button>';
      }
    }
    html += '<button class="act-btn" onclick="openEdit(\''+task.id+'\')">✎</button>';
    html += '<button class="act-btn red" onclick="delTask(\''+task.id+'\')">✕</button>';
    html += '</div>';
    html += '</div>';
  });

  if (!isPast) html += '<div class="add-row" onclick="openAdd(\''+date+'\')"><span>+</span> Add task</div>';
  html += '</div></div>';
  return html;
}

function toggleDay(date) {
  var groups = document.querySelectorAll('.day-group');
  groups.forEach(function(g){
    var hdr = g.querySelector('.day-hdr');
    if (!hdr) return;
    var lbl = hdr.querySelector('.day-label');
    if (lbl && lbl.closest('.day-group') === g) {
      if (g.dataset.date === date) g.classList.toggle('closed');
    }
  });
  /* Simpler: re-render with collapsed state */
  /* Instead toggle directly */
}

/* BUG FIX: Toggle done only for that specific task, not the whole day */
function toggleDone(id) {
  var t = tasks.find(function(x){ return x.id === id; });
  if (t) { t.done = !t.done; save(); render(); }
}

/* For repeated tasks: track done state per date occurrence */
function toggleRepeatDone(id, date) {
  var t = tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  if (!t.doneDates) t.doneDates = {};
  t.doneDates[date] = !t.doneDates[date];
  save(); render();
}

function delTask(id) {
  tasks = tasks.filter(function(t){ return t.id !== id; });
  save(); render(); toast('Task deleted');
}

function exportTasks() {
  var b = new Blob([JSON.stringify(tasks,null,2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'bullet-journal-'+todayStr()+'.json';
  a.click();
  toast('Exported!');
}

function importTasks(e) {
  var file = e.target.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw 0;
      var ex = {}; tasks.forEach(function(t){ ex[t.id] = true; });
      var added = 0;
      data.forEach(function(t){ if (!ex[t.id]) { tasks.push(t); added++; } });
      save(); render(); toast('Imported '+added+' task'+(added!==1?'s':''));
    } catch(err) { toast('Import failed: bad JSON'); }
    e.target.value = '';
  };
  r.readAsText(file);
}

document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

/* ── INIT ── */
load();
updateTodayBadge();

if (tasks.length === 0) {
  var d = todayStr();
  tasks = [
    {id:uid(),name:'Set up Bullet Journal',date:d,time:'',type:'star',priority:'red',done:false,repeat:false,repeatEnd:'',interval:'1',createdAt:Date.now()},
    {id:uid(),name:'Review this week\'s goals',date:d,time:'09:00',type:'task',priority:'yellow',done:false,repeat:false,repeatEnd:'',interval:'1',createdAt:Date.now()},
    {id:uid(),name:'Daily check-in',date:d,time:'',type:'task',priority:'green',done:false,repeat:true,repeatEnd:addDays(d,6),interval:'1',createdAt:Date.now()}
  ];
  save();
}
render();
</script>
